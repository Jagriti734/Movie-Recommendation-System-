<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #141414;
            color: white;
        }

        .navbar {
            background-color: #e50914;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .movie-card {
            background: #222;
            border-radius: 12px;
            padding: 15px;
            margin: 10px;
            transition: 0.3s;
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .recommendation-box {
            margin-top: 40px;
        }

        select {
            color: black;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                🎬 Movie Recommendation System
            </span>
        </div>
    </nav>

    <div class="container">

        <div class="hero">
            <h1>Find Movies You'll Love</h1>
            <p>AI-powered movie recommendations based on content similarity.</p>

            <form method="POST">

                <div class="row justify-content-center">
                    <div class="col-md-6">

                        <select name="movie" class="form-select form-select-lg">

                            {% for movie in movie_list %}
                            <option value="{{ movie }}">
                                {{ movie }}
                            </option>
                            {% endfor %}

                        </select>

                    </div>
                </div>

                <button class="btn btn-danger btn-lg mt-3">
                    Recommend Movies
                </button>

            </form>
        </div>

        {% if recommendations %}

        <div class="recommendation-box">

            <h2 class="text-center mb-4">
                Recommended Movies
            </h2>

            <div class="row">

                {% for movie in recommendations %}

                <div class="col-md-4">

                    <div class="movie-card">

                        <h5>{{ movie }}</h5>

                    </div>

                </div>

                {% endfor %}

            </div>

        </div>

        {% endif %}

    </div>

</body>
</html>
