<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>

    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            color: #e50914;
        }

        form {
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .movies {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background-color: #222;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            width: 220px;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        p {
            font-size: 14px;
        }
    </style>
</head>

<body>

<h1>🎬 Movie Recommender</h1>

<form method="POST">
    <input type="text" name="movie" placeholder="Enter movie name">
    <button type="submit">Recommend</button>
</form>

<div class="movies">
{% for m in movies %}
    <div class="card">
        <h3>{{ m.title }}</h3>
        <img src="{{ m.poster }}">
        <p>{{ m.plot }}</p>
    </div>
{% endfor %}
</div>

</body>
</html>
